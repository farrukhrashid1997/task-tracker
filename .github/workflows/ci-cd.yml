name: Task Manager CI/CD

on:
  push:
    branches: [develop]
  
  pull_request:
    branches: [develop]


jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker images
      run: docker compose build
    
    - name: Run tests
      run: |
        docker compose up -d
        docker compose exec django pytest -v
        docker compose down
